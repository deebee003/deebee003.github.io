<!DOCTYPE html>
<html>
<head>
<title>Random Roblox User</title>

<style>
body{
    font-family:Arial;
    background:#111827;
    color:white;
    text-align:center;
    padding-top:100px;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.result{
    margin-top:25px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>Random Roblox User Generator</h1>

<button onclick="generateUser()">Generate</button>

<div class="result" id="result"></div>

<script>

function randomID(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

async function generateUser(){

const id = randomID(100,777777);

document.getElementById("result").innerText="Checking ID "+id+"...";

try{

const url = "https://corsproxy.io/?https://users.roblox.com/v1/users/"+id;

const response = await fetch(url);
const data = await response.json();

if(data.name){

document.getElementById("result").innerHTML = `
Username: <b>${data.name}</b><br>
UserID: ${id}<br><br>
<a href="https://www.roblox.com/users/${id}/profile" target="_blank">Open Profile</a>
`;

}else{

document.getElementById("result").innerText="User not found. Try again.";

}

}catch(e){

document.getElementById("result").innerText="Error contacting Roblox API.";

}

}

</script>

</body>
</html>
