<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Old Roblox User</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>Random Old Roblox User</h2>

<button onclick="generateUser()">Find Old Account</button>

<div class="result" id="result">Press the button</div>

</div>

<script>

function randomID(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

async function generateUser(){

    const result = document.getElementById("result");

    result.innerText = "Scanning IDs...";

    while(true){

        const id = randomID(100,777777);

        try{

            const url = "https://corsproxy.io/?https://users.roblox.com/v1/users/" + id;

            const res = await fetch(url);
            const text = await res.text();
            const data = JSON.parse(text);

            if(data && data.id){

                const year = new Date(data.created).getFullYear();

                if(year <= 2010){

                    result.innerHTML = `
                    Username: <b>${data.name}</b><br>
                    Display Name: ${data.displayName}<br>
                    Created: ${data.created}<br>
                    UserID: ${data.id}<br><br>
                    <a href="https://www.roblox.com/users/${data.id}/profile" target="_blank">Open Profile</a>
                    `;

                    break;
                }

            }

        }catch(e){}

    }

}

</script>

</body>
</html>
