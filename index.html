<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Old Roblox Account Finder</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:18px;
}

.list{
    margin-top:20px;
    text-align:left;
    max-height:300px;
    overflow:auto;
}
</style>

</head>

<body>

<div class="container">

<h2>Old Roblox User Finder</h2>

<button onclick="startScan()">Start Scanning</button>

<div class="result" id="status">
Press start
</div>

<div class="list" id="users"></div>

</div>

<script>

let scanning = false;

function randomID(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

async function checkUser(){

    const id = randomID(100,777777);

    document.getElementById("status").innerText = "Checking ID: " + id;

    try{

        const url = "https://corsproxy.io/?https://users.roblox.com/v1/users/" + id;

        const res = await fetch(url);
        const text = await res.text();
        const data = JSON.parse(text);

        if(data && data.id){

            const createdYear = new Date(data.created).getFullYear();

            if(createdYear <= 2010){

                const container = document.getElementById("users");

                container.innerHTML =
                `
                Username: <b>${data.name}</b><br>
                Display Name: ${data.displayName}<br>
                Created: ${data.created}<br>
                UserID: ${data.id}<br>
                <a href="https://www.roblox.com/users/${data.id}/profile" target="_blank">Profile</a>
                <hr>
                ` + container.innerHTML;

            }

        }

    }catch(e){}

}

async function startScan(){

    if(scanning) return;

    scanning = true;

    while(scanning){

        await checkUser();

        await new Promise(r => setTimeout(r,400));

    }

}

</script>

</body>
</html>
